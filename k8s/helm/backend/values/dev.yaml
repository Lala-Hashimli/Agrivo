replicaCount: 1

image:
  repository: harbor.example.com/agrivo/backend
  tag: dev
  pullPolicy: IfNotPresent

config:
  nodeEnv: production
  port: "5000"
  jwtExpiresIn: 7d
  frontendUrl: https://dev.agrivo.example.com

secret:
  databaseUrl: postgresql://postgres:password@postgres:5432/agrivo_db?schema=public
  jwtSecret: dev-placeholder-replace-with-key-vault

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
