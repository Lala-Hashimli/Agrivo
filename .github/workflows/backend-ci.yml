name: Backend CI

on:
  push:
    branches:
      - main
      - devops/**
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agrivo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agrivo_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/agrivo_db?schema=public
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Start backend health smoke test
        run: |
          npm start &
          sleep 10
          curl --fail http://localhost:5000/api/health
          curl --fail http://localhost:5000/api/health/live
          curl --fail http://localhost:5000/api/health/ready
          curl --fail http://localhost:5000/api/metrics
